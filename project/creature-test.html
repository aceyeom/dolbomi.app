<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creature Test</title>
<style>
  html,body{margin:0;background:#0a0c0e;font-family:system-ui;color:#eee;}
  #stage{width:100vw;height:70vh;}
  .panel{display:flex;flex-wrap:wrap;gap:8px;padding:14px;align-items:center;}
  button{background:#1c2127;color:#eee;border:1px solid #333;border-radius:8px;padding:8px 12px;cursor:pointer;}
  button:hover{background:#2a2f37;}
  label{display:flex;flex-direction:column;font-size:11px;gap:3px;min-width:90px;}
  input[type=range]{width:100%;}
</style>
</head>
<body>
<div id="stage"></div>
<div class="panel" id="panel"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="creature.js"></script>
<script type="module">
function boot() {
  const stats = { body:62, mind:70, money:64, craft:58, people:66, edge:60 };
  const c = window.DolbomiCreature.create({
    container: document.getElementById('stage'),
    path: 'haechi', companion: 'fox', stats, milestones: 4, theme: 'dark', accent: '#E7A33C', interactive: true,
    onCompanionTap: (p) => c.setPath(p),
  });
  window.__c = c;
  const panel = document.getElementById('panel');
  ['haechi','dragon','phoenix','tiger'].forEach(p=>{
    const b=document.createElement('button'); b.textContent=p;
    b.onclick=()=>c.setPath(p); panel.appendChild(b);
  });
  let compOn = true;
  const cb=document.createElement('button'); cb.textContent='companion';
  cb.onclick=()=>{ compOn=!compOn; c.setCompanion(compOn?'fox':null); }; panel.appendChild(cb);
  const td=document.createElement('button'); td.textContent='dark'; td.onclick=()=>c.setTheme('dark','#E7A33C'); panel.appendChild(td);
  const tl=document.createElement('button'); tl.textContent='light'; tl.onclick=()=>c.setTheme('light','#C8821E'); panel.appendChild(tl);
  const pu=document.createElement('button'); pu.textContent='PULSE'; pu.onclick=()=>c.pulse(); panel.appendChild(pu);
  Object.keys(stats).forEach(k=>{
    const l=document.createElement('label'); l.textContent=k;
    const r=document.createElement('input'); r.type='range'; r.min=0;r.max=100;r.value=stats[k];
    r.oninput=()=>{stats[k]=+r.value; c.setStats(stats);};
    l.appendChild(r); panel.appendChild(l);
  });
  const ms=document.createElement('label'); ms.textContent='milestones';
  const mr=document.createElement('input'); mr.type='range'; mr.min=0;mr.max=12;mr.value=4;
  mr.oninput=()=>c.setMilestones(+mr.value); ms.appendChild(mr); panel.appendChild(ms);
}
if (window.DolbomiCreature) boot();
else window.addEventListener('dolbomi-creature-ready', boot);
</script>
</body>
</html>
