<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DOLBOMI — 홈 화면 스킨 탐색</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-font-smoothing: antialiased; }
</style>
<script>
  // Seed a fit-all initial canvas view (only if the user hasn't panned yet).
  try {
    var k = 'dc-viewport:' + location.pathname;
    if (!localStorage.getItem(k)) localStorage.setItem(k, JSON.stringify({ x: 40, y: 28, scale: 0.5 }));
  } catch (e) {}
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dolbomi-data.jsx"></script>
<script type="text/babel" src="skin-neon.jsx"></script>
<script type="text/babel" src="skin-tactical.jsx"></script>
<script type="text/babel" src="skin-fintech.jsx"></script>
<script type="text/babel" src="skin-terminal.jsx"></script>

<script type="text/babel">
const board = { background: 'transparent', boxShadow: 'none', overflow: 'visible', borderRadius: 0 };

function Phone({ dark, children }) {
  return <IOSDevice dark={dark}>{children}</IOSDevice>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="home"
        title="DOLBOMI · 홈 화면 (HUD) — 스킨 탐색"
        subtitle="같은 화면, 4가지 분위기. 콘텐츠는 모두 동일 — 계급·전역 D-day·연속·적금·6스탯(The Gap). 하나를 골라 최종으로 다듬습니다.">
        <DCArtboard id="neon" label="A · 상태창 네온 HUD — 게임/솔로레벨링" width={402} height={874} style={board}>
          <Phone dark><NeonScreen /></Phone>
        </DCArtboard>
        <DCArtboard id="tactical" label="B · 리파인드 택티컬 — 프리미엄·절제" width={402} height={874} style={board}>
          <Phone dark><TacScreen /></Phone>
        </DCArtboard>
        <DCArtboard id="fintech" label="C · 라이트 핀테크 — 토스 감성·친근" width={402} height={874} style={board}>
          <Phone dark={false}><FinScreen /></Phone>
        </DCArtboard>
        <DCArtboard id="terminal" label="D · 전술 단말기 — CRT 터미널·와일드카드" width={402} height={874} style={board}>
          <Phone dark><TrmScreen /></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
