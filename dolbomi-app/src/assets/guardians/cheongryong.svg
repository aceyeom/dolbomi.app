<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- 청룡 — 동방의 수호룡. 단청-inspired folk-art medallion. -->
  <defs>
    <radialGradient id="dBg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#EAF4FF"/>
      <stop offset="62%" stop-color="#D4E7FA"/>
      <stop offset="100%" stop-color="#B5D4F0"/>
    </radialGradient>
    <linearGradient id="dBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8BD4"/>
      <stop offset="55%" stop-color="#2B6CB8"/>
      <stop offset="100%" stop-color="#1C4E8C"/>
    </linearGradient>
    <linearGradient id="dFin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FC4D8"/>
      <stop offset="100%" stop-color="#4596B8"/>
    </linearGradient>
    <linearGradient id="dGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C56B"/>
      <stop offset="100%" stop-color="#D9A441"/>
    </linearGradient>
  </defs>

  <!-- medallion -->
  <circle cx="120" cy="120" r="112" fill="url(#dBg)"/>
  <circle cx="120" cy="120" r="112" fill="none" stroke="#D9A441" stroke-width="3"/>
  <circle cx="120" cy="120" r="105" fill="none" stroke="#2B6CB8" stroke-width="1.4" stroke-dasharray="1 7" stroke-linecap="round" opacity=".5"/>

  <!-- 구름문 cloud swirls -->
  <g fill="none" stroke="#8FB8E0" stroke-width="3" stroke-linecap="round" opacity=".8">
    <path d="M30 140c8-10 22-10 28-2-9-1-15 3-17 9"/>
    <path d="M186 50c7-9 19-9 24-2-8-1-13 3-15 8"/>
    <path d="M182 186c8-9 21-9 26-1-9-1-14 3-16 8"/>
    <path d="M44 62c6-8 17-8 22-2-7-1-12 2-14 7"/>
  </g>

  <!-- serpentine body: S-curve sweeping the medallion -->
  <path d="M52 170c-6-22 8-38 30-40 18-2 30 6 46 4 14-2 22-10 20-24-2-12-12-18-24-16 6-8 18-10 28-4 12 7 16 22 10 36-8 18-28 26-50 22-14-2-26-2-34 6-7 7-8 16-2 24 8 10 24 10 32 2 4 10-6 18-18 18-18 0-34-12-38-28z"
    fill="url(#dBody)" stroke="#10325C" stroke-width="3.4" stroke-linejoin="round"/>

  <!-- belly line -->
  <g fill="none" stroke="#9FD1E8" stroke-width="2.4" stroke-linecap="round" opacity=".9">
    <path d="M64 158c10-8 24-10 38-8"/>
    <path d="M70 172c10-8 22-10 34-9"/>
  </g>

  <!-- dorsal fins along the upper curve -->
  <g fill="url(#dFin)" stroke="#10325C" stroke-width="2.4" stroke-linejoin="round">
    <path d="M150 88l10-16 6 14z"/>
    <path d="M168 80l12-13 3 15z"/>
    <path d="M100 122l6-15 9 12z"/>
    <path d="M122 124l5-14 10 11z"/>
  </g>

  <!-- tail fin -->
  <path d="M50 178c-12 0-20-8-20-18 7 5 14 5 20 1-3 6-2 12 4 16z"
    fill="url(#dFin)" stroke="#10325C" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- foreleg + gold claw reaching the pearl -->
  <path d="M148 148c10 2 18 10 19 20l-16-4-10-12z" fill="url(#dBody)" stroke="#10325C" stroke-width="3" stroke-linejoin="round"/>
  <path d="M164 166l10 4M165 170l8 7M161 172l4 9" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>

  <!-- 여의주 pearl -->
  <circle cx="184" cy="172" r="13" fill="url(#dGold)" stroke="#8A5E14" stroke-width="2.4"/>
  <circle cx="180" cy="167" r="4" fill="#FFF3DC"/>
  <g stroke="#E8B956" stroke-width="2" stroke-linecap="round" opacity=".8">
    <path d="M184 152v-7M196 158l5-5M171 158l-5-5"/>
  </g>

  <!-- head -->
  <path d="M96 52c16-12 38-10 50 4 10 12 10 28 0 38l-22 12c-14 4-28-2-34-14-7-14-4-30 6-40z"
    fill="url(#dBody)" stroke="#10325C" stroke-width="3.4" stroke-linejoin="round"/>

  <!-- horns — antler style -->
  <g fill="none" stroke="#D9A441" stroke-width="5" stroke-linecap="round">
    <path d="M108 48c-2-10 2-18 10-24"/>
    <path d="M108 42c-6-4-8-10-7-17"/>
    <path d="M126 44c1-9 7-15 15-18"/>
  </g>

  <!-- ear fin -->
  <path d="M94 64c-9-3-13-10-12-19 5 6 11 8 17 7z" fill="url(#dFin)" stroke="#10325C" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- brow + eye -->
  <path d="M112 76c6-5 14-6 20-2" fill="none" stroke="#10325C" stroke-width="3.4" stroke-linecap="round"/>
  <circle cx="122" cy="84" r="6.5" fill="#0C2240"/>
  <circle cx="124.5" cy="81.5" r="2.2" fill="#EAF4FF"/>

  <!-- snout + smile + whiskers -->
  <path d="M138 86c8 0 14 5 15 12 1 6-4 11-11 12" fill="none" stroke="#10325C" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M122 100c6 5 13 7 20 5" fill="none" stroke="#10325C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="148" cy="92" r="3.2" fill="#10325C"/>
  <g fill="none" stroke="#4596B8" stroke-width="2.6" stroke-linecap="round">
    <path d="M150 100c10 0 16 5 18 13"/>
    <path d="M148 106c8 2 12 7 12 14"/>
  </g>
</svg>
