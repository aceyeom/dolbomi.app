services:
  # ── Single Web Service: Express API + serves the Vite build ─────────────
  # Build command runs `vite build` first so the dist/ folder exists when
  # the server starts.  The server's static middleware picks it up automatically.
  - type: web
    name: dolbomi-api
    runtime: node
    region: oregon
    rootDir: dolbomi-app
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # DATABASE_URL or similar — add your Supabase / Postgres vars here if
      # you migrate away from SQLite.  See SUPABASE.md for details.
